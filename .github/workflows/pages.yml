name: Deploy Pages
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.publish.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Process
        env:
          A59D07: ${{ secrets.A59D07 }}
          B66563: ${{ secrets.B66563 }}
        run: |
          python3 -c "
          import os, sys, pathlib
          tag_a = os.environ.get('A59D07', '')
          tag_b = os.environ.get('B66563', '')
          fpath = pathlib.Path('index.html')
          orig = fpath.read_text(encoding='utf-8')
          updated = orig
          if tag_a:
              updated = updated.replace('<!-- 1ecddfbd9f21fc8e0529fb72 -->', tag_a)
          if tag_b:
              updated = updated.replace('<!-- 85158a176e18dc5a777e86ce7f735547cbc45df9 -->', tag_b)
          if updated == orig and (tag_a or tag_b):
              sys.exit(1)
          if updated != orig:
              fpath.write_text(updated, encoding='utf-8')
          "
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: publish
        uses: actions/deploy-pages@v4
